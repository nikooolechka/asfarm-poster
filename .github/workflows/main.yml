name: publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Канал: all | vc | vk | dzen"
        default: "all"
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Validate (pytest)
        run: python -m pytest -q

      - name: Publish
        env:
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_OWNER_ID: ${{ secrets.VK_OWNER_ID }}
          VC_TOKEN: ${{ secrets.VC_TOKEN }}
          VC_SUBSITE_ID: ${{ secrets.VC_SUBSITE_ID }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: python -m src.publish --channel "${{ github.event.inputs.channel || 'all' }}"

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/queue.json docs/ || true
          git commit -m "chore: update queue and dzen feed [skip ci]" || echo "nothing to commit"
          git push || echo "nothing to push"
